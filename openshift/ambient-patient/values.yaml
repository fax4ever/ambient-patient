# Ambient Patient Helm Chart - app-server + full-agent-ui

namespace: ambient-patient

images:
  registry: image-registry.openshift-image-registry.svc:5000
  namespace: ambient-patient
  pullPolicy: Always  # Always pull latest images (use IfNotPresent for tagged releases)
  # Single image for both app-server and full-agent-ui (same Dockerfile, different command)
  appServer:
    repository: app-server
    tag: latest
  # ace-controller-voice-interface: python-app
  aceControllerPipeline:
    repository: ace-controller-pipeline
    tag: latest
  # ace-controller-voice-interface: ui-app (webrtc frontend)
  uiApp:
    repository: ace-controller-ui
    tag: latest

# Env names match agent/vars.env
appServer:
  replicaCount: 1
  port: 8081
  # API keys (sensitive - use --set or override)
  nvidiaApiKey: ""
  ngcApiKey: ""
  tavilyApiKey: ""
  langsmithApiKey: ""
  # Agent LLM
  agentLlmBaseUrl: "https://integrate.api.nvidia.com/v1"
  agentLlmModel: "meta/llama-3.3-70b-instruct"
  logLevel: "INFO"
  nemoGuardrailsConfigPath: "nmgr-config-store/patient-intake-nemoguard"
  # Langsmith
  langsmithTracing: "true"
  langsmithEndpoint: "https://api.smith.langchain.com"
  langsmithProject: "healthcare-agent-project"
  # App
  timezone: "America/Los_Angeles"
  appOutputDir: "app_output_files"

# full-agent-ui uses same env as app-server (vars.env)
fullAgentUi:
  replicaCount: 1
  port: 7861

# ace-controller-voice-interface python-app (env from ace_controller.env)
aceControllerPipeline:
  replicaCount: 1
  port: 7860
  ngcApiKey: ""
  nvidiaApiKey: ""
  configPath: "./configs/config_riva_public_endpoints.yaml"
  # If empty, Helm sets RAG_SERVER_URL to the in-cluster app-server Service (same namespace).
  # Set explicitly for cross-namespace RAG or non-Helm installs (e.g. http://app-server-healthcare-assistant:8081).
  ragServerUrl: ""
  requestTimeout: "15.0"
  # Passes -v to pipeline-patient.py → loguru TRACE (very chatty). false → DEBUG (default for pipeline stderr).
  verbose: false
  # WebRTC TURN (required when browser and pod are not on the same routable UDP path).
  # Must match the UI image build (VITE_TURN_* in Dockerfile-webrtc-ui / build-images.sh).
  turnServerUrl: ""
  turnUsername: ""
  turnPassword: ""
  # Optional: Metered REST credentials (UI can GET /ice_config; key stays server-side). Override URL if your app uses another host.
  meteredTurnApiKey: ""
  meteredCredentialsUrl: "https://fax.metered.live/api/v1/turn/credentials"

# ace-controller-voice-interface ui-app (webrtc frontend)
uiApp:
  replicaCount: 1
  port: 4400

resources:
  appServer:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  fullAgentUi:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  aceControllerPipeline:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  uiApp:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"

service:
  type: ClusterIP
  appServer:
    port: 8081
  fullAgentUi:
    port: 7861
  aceControllerPipeline:
    port: 7860
  uiApp:
    port: 4400

route:
  fullAgentUi:
    enabled: true
    host: ""  # optional; auto-generated if empty
  voiceInterface:
    enabled: true
    # Path-based routing: UI (/) and API (/api) share one hostname. Per-namespace default:
    #   voice-interface-<namespace>.<clusterDomain>
    # Get clusterDomain from an existing route, e.g.:
    #   oc get route -n <ns> -o jsonpath='{.items[0].spec.host}' | cut -d'.' -f2-
    clusterDomain: "apps.ai-dev02.kni.syseng.devcluster.openshift.com"
    # Optional: full hostname (overrides clusterDomain + namespace). Use for custom DNS or legacy installs.
    host: ""
