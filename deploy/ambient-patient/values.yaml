# Ambient Patient Helm Chart - app-server + full-agent-ui

namespace: ambient-patient

images:
  registry: image-registry.openshift-image-registry.svc:5000
  namespace: ambient-patient
  pullPolicy: Always  # Always pull latest images (use IfNotPresent for tagged releases)
  # Single image for both app-server and full-agent-ui (same Dockerfile, different command)
  appServer:
    repository: app-server
    tag: latest
  # ace-controller-voice-interface: python-app
  aceControllerPipeline:
    repository: ace-controller-pipeline
    tag: latest
  # ace-controller-voice-interface: ui-app (webrtc frontend)
  uiApp:
    repository: ace-controller-ui
    tag: latest
  # Coturn TURN server (build with ./deploy/build-images.sh coturn)
  turnServer:
    repository: coturn
    tag: latest
  # Websockify sidecar for TURN at path /turn (build with ./deploy/build-images.sh websockify or all)
  websockify:
    repository: websockify
    tag: latest

# Env names match agent/vars.env
appServer:
  replicaCount: 1
  port: 8081
  # API keys (sensitive - use --set or override)
  nvidiaApiKey: ""
  ngcApiKey: ""
  tavilyApiKey: ""
  langsmithApiKey: ""
  # Agent LLM
  agentLlmBaseUrl: "https://integrate.api.nvidia.com/v1"
  agentLlmModel: "meta/llama-3.3-70b-instruct"
  logLevel: "INFO"
  nemoGuardrailsConfigPath: "nmgr-config-store/patient-intake-nemoguard"
  # Langsmith
  langsmithTracing: "true"
  langsmithEndpoint: "https://api.smith.langchain.com"
  langsmithProject: "healthcare-agent-project"
  # App
  timezone: "America/Los_Angeles"
  appOutputDir: "app_output_files"

# full-agent-ui uses same env as app-server (vars.env)
fullAgentUi:
  replicaCount: 1
  port: 7861

# ace-controller-voice-interface python-app (env from ace_controller.env)
aceControllerPipeline:
  replicaCount: 1
  port: 7860
  ngcApiKey: ""
  nvidiaApiKey: ""
  configPath: "./configs/config_riva_public_endpoints.yaml"
  requestTimeout: "15.0"

# ace-controller-voice-interface ui-app (webrtc frontend)
uiApp:
  replicaCount: 1
  port: 4400

# Coturn TURN server for WebRTC (see deploy/turn-server.md).
# The pipeline and UI use TURN for NAT traversal. When route.turnServer.enabled is true, host is taken from route.voiceInterface.host (path /turn).
# Otherwise set turnServer.host (e.g. localhost for port-forward, or node public IP when using hostNetwork).
# Image is the built image from ./deploy/build-images.sh coturn (images.registry/namespace/coturn:latest).
turnServer:
  # Host or IP where the browser can reach the TURN server (ignored when route.turnServer.enabled; default localhost for port-forward).
  host: "localhost"
  # Set to false to run without hostNetwork (works on OpenShift without hostnetwork SCC). Use port-forward and turnServer.host=localhost.
  hostNetwork: false
  username: "admin"
  password: "admin"
  realm: "tokkio.realm.org"
  minPort: 51000
  maxPort: 51010

resources:
  appServer:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  fullAgentUi:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  aceControllerPipeline:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  uiApp:
    requests:
      memory: "128Mi"
      cpu: "50m"
  turnServer:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

service:
  type: ClusterIP
  appServer:
    port: 8081
  fullAgentUi:
    port: 7861
  aceControllerPipeline:
    port: 7860
  uiApp:
    port: 4400
  turnServer:
    port: 3478

route:
  fullAgentUi:
    enabled: true
    host: ""  # optional; auto-generated if empty
  voiceInterface:
    enabled: true
    # REQUIRED for path-based routing: both UI (/) and API (/api) routes must share same hostname
    # Get your cluster domain: oc get route -n ambient-patient -o jsonpath='{.items[0].spec.host}' | cut -d'.' -f2-
    # Then set: voice-interface.<cluster-domain>
    # Example: voice-interface.apps.ai-dev02.kni.syseng.devcluster.openshift.com
    host: "voice-interface.apps.ai-dev02.kni.syseng.devcluster.openshift.com"
  # TURN server on same host at path /turn (WebSocket proxy to TURN). When enabled, turnServer.host is set from route.voiceInterface.host and TURN_SERVER_URL uses port 443.
  turnServer:
    enabled: true
    path: "/turn"
    # WebSocket-to-TCP sidecar image. Default: built image from registry (./deploy/build-images.sh websockify). Override if you use an external image.
    websockifyImage: ""  # empty = use images.registry/namespace/websockify:latest
